name: Agent status sync

on:
  schedule:
    # Daily auto campaign watch + status export (UTC 06:00)
    - cron: '0 6 * * *'
    # Keep Monday extra pass
    - cron: '0 12 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'agents/**'
      - 'scripts/campaign-watch.mjs'
      - 'scripts/export-agent-status.mjs'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto campaign watch + export + validate
        run: npm run agents:sync

      - name: Commit agent data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/eliora/atelier/data/agents/status.json agents/contests.yaml agents/campaign-action-queue.json
          if git diff --staged --quiet; then
            echo "No agent data changes"
          else
            git commit -m "chore(agents): auto campaign watch $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main
            git push origin main
          fi