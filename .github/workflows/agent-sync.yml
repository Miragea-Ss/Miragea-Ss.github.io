name: Agent status sync

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'agents/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export agent status
        run: npm run agents:export

      - name: Validate agent status
        run: npm run agents:validate

      - name: Commit status.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/eliora/atelier/data/agents/status.json
          if git diff --staged --quiet; then
            echo "No changes to status.json"
          else
            git commit -m "chore(agents): sync status $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi