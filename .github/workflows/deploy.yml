name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate agent status JSON
        run: npm run agents:validate

      - name: Check contact inbox configuration
        env:
          SECRET_CONTACT_INBOX: ${{ secrets.CONTACT_INBOX }}
          VAR_CONTACT_INBOX: ${{ vars.CONTACT_INBOX }}
          SECRET_FORM_SUBMIT_TOKEN: ${{ secrets.FORM_SUBMIT_TOKEN }}
          VAR_FORM_SUBMIT_TOKEN: ${{ vars.FORM_SUBMIT_TOKEN }}
        run: |
          if [ -n "$SECRET_FORM_SUBMIT_TOKEN" ]; then
            echo "OK: secrets.FORM_SUBMIT_TOKEN is set (length ${#SECRET_FORM_SUBMIT_TOKEN})"
          elif [ -n "$VAR_FORM_SUBMIT_TOKEN" ]; then
            echo "OK: vars.FORM_SUBMIT_TOKEN is set (length ${#VAR_FORM_SUBMIT_TOKEN})"
          elif [ -n "$SECRET_CONTACT_INBOX" ]; then
            echo "OK: secrets.CONTACT_INBOX is set (length ${#SECRET_CONTACT_INBOX})"
          elif [ -n "$VAR_CONTACT_INBOX" ]; then
            echo "OK: vars.CONTACT_INBOX is set (length ${#VAR_CONTACT_INBOX})"
          else
            echo "::error::No contact inbox configured."
            echo "Add Repository secret CONTACT_INBOX = wolf6gl@gmail.com"
            echo "  Settings → Secrets and variables → Actions → Repository secrets → New secret"
            echo "Or add Repository variable CONTACT_INBOX (Variables tab)."
            exit 1
          fi

      - name: Build
        env:
          SECRET_CONTACT_INBOX: ${{ secrets.CONTACT_INBOX }}
          VAR_CONTACT_INBOX: ${{ vars.CONTACT_INBOX }}
          SECRET_FORM_SUBMIT_TOKEN: ${{ secrets.FORM_SUBMIT_TOKEN }}
          VAR_FORM_SUBMIT_TOKEN: ${{ vars.FORM_SUBMIT_TOKEN }}
        run: |
          if [ -n "$SECRET_FORM_SUBMIT_TOKEN" ]; then
            export PUBLIC_FORM_SUBMIT_TOKEN="$SECRET_FORM_SUBMIT_TOKEN"
            echo "Contact: using secrets.FORM_SUBMIT_TOKEN"
          elif [ -n "$VAR_FORM_SUBMIT_TOKEN" ]; then
            export PUBLIC_FORM_SUBMIT_TOKEN="$VAR_FORM_SUBMIT_TOKEN"
            echo "Contact: using vars.FORM_SUBMIT_TOKEN"
          elif [ -n "$SECRET_CONTACT_INBOX" ]; then
            export PUBLIC_CONTACT_INBOX="$SECRET_CONTACT_INBOX"
            echo "Contact: using secrets.CONTACT_INBOX"
          else
            export PUBLIC_CONTACT_INBOX="$VAR_CONTACT_INBOX"
            echo "Contact: using vars.CONTACT_INBOX"
          fi
          npm run build

      - name: Verify contact form is wired
        run: |
          if grep -q 'formsubmit.co/' dist/eliora/atelier/ja/contact/index.html; then
            echo "OK: FormSubmit endpoint present in built contact page"
          else
            echo "::error::Built contact page has no FormSubmit endpoint. Set secrets.CONTACT_INBOX (or vars.CONTACT_INBOX) and redeploy."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4