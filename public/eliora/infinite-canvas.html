<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eliora Infinite Canvas</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: rgba(8, 8, 9, .84);
        --line: rgba(255,255,255,.16);
        --text: #f7f2ea;
        --muted: #aaa39a;
        --rose: #f2799a;
        --cyan: #7bd8e8;
        --amber: #f5b864;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .app { height: 100vh; display: grid; grid-template-rows: auto 1fr; }
      .bar {
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(0,0,0,.72);
        backdrop-filter: blur(18px);
      }
      .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .brand img { width: 38px; height: 38px; border-radius: 8px; object-fit: cover; border: 1px solid var(--line); }
      .brand strong { display: block; font-size: 16px; }
      .brand span { color: var(--muted); font-size: 12px; }
      .tools { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
      button, a.tool {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255,255,255,.05);
        color: var(--text);
        padding: 0 12px;
        font-weight: 800;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }
      button.primary { background: #f4eee4; color: #050505; border-color: #f4eee4; }
      .stage {
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
          radial-gradient(circle at 25% 15%, rgba(242,121,154,.12), transparent 32%),
          radial-gradient(circle at 76% 78%, rgba(123,216,232,.10), transparent 34%),
          #050505;
        background-size: 42px 42px, 42px 42px, auto, auto;
        cursor: grab;
      }
      .stage.dragging { cursor: grabbing; }
      .world { position: absolute; left: 0; top: 0; transform-origin: 0 0; width: 1px; height: 1px; }
      .node {
        position: absolute;
        width: 280px;
        min-height: 130px;
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 28px 80px rgba(0,0,0,.55);
        padding: 16px;
        user-select: none;
      }
      .node.selected { outline: 2px solid var(--rose); }
      .node h3 { margin: 0 0 10px; font-size: 20px; letter-spacing: 0; }
      .node p { margin: 0; color: var(--muted); line-height: 1.6; }
      .node small { display: block; margin-top: 12px; color: var(--cyan); text-transform: uppercase; letter-spacing: .12em; font-weight: 800; }
      .hud {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 2;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 12px;
      }
      .pill { border: 1px solid var(--line); border-radius: 8px; background: rgba(0,0,0,.62); padding: 8px 10px; }
      @media (max-width: 780px) {
        .bar { align-items: flex-start; flex-direction: column; }
        .tools { justify-content: flex-start; }
        .node { width: 240px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="bar">
        <a class="brand" href="/eliora/index.html">
          <img src="/assets/brand/eliora-logo.png" alt="Eliora logo" />
          <span><strong>Eliora Infinite Canvas</strong><span>Local-first visual workspace</span></span>
        </a>
        <div class="tools">
          <button class="primary" id="addNote">Add Note</button>
          <button id="addWorkflow">Add Workflow</button>
          <button id="fit">Fit</button>
          <button id="exportJson">Export</button>
          <button id="reset">Reset</button>
          <a class="tool" href="/en/">Miragea</a>
        </div>
      </header>
      <main class="stage" id="stage">
        <div class="world" id="world"></div>
        <div class="hud">
          <span class="pill" id="zoomLabel">100%</span>
          <span class="pill">Drag canvas / wheel zoom / drag nodes</span>
          <span class="pill">Saved in this browser</span>
        </div>
      </main>
    </div>

    <script>
      const stage = document.getElementById('stage');
      const world = document.getElementById('world');
      const zoomLabel = document.getElementById('zoomLabel');
      const storageKey = 'eliora-infinite-canvas-v1';
      let camera = { x: innerWidth / 2 - 220, y: innerHeight / 2 - 130, z: 1 };
      let nodes = [];
      let dragCanvas = null;
      let dragNode = null;
      let selected = null;

      const seed = [
        { id: crypto.randomUUID(), x: -360, y: -150, kind: 'Archive', title: 'Miragea', text: 'EX routes, X works, perception records, visual language.' },
        { id: crypto.randomUUID(), x: 40, y: -40, kind: 'Service', title: 'Eliora', text: 'AI services, digital products, consulting, community.' },
        { id: crypto.randomUUID(), x: -150, y: 210, kind: 'Data', title: 'Local First', text: 'GitHub, Docker, PostgreSQL, backups, private memory.' },
      ];

      function load() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
          nodes = saved?.nodes?.length ? saved.nodes : seed;
          camera = saved?.camera || camera;
        } catch {
          nodes = seed;
        }
      }

      function save() {
        localStorage.setItem(storageKey, JSON.stringify({ nodes, camera }));
      }

      function render() {
        world.style.transform = `translate(${camera.x}px, ${camera.y}px) scale(${camera.z})`;
        zoomLabel.textContent = `${Math.round(camera.z * 100)}%`;
        world.innerHTML = '';
        for (const node of nodes) {
          const el = document.createElement('article');
          el.className = 'node' + (selected === node.id ? ' selected' : '');
          el.style.left = `${node.x}px`;
          el.style.top = `${node.y}px`;
          el.dataset.id = node.id;
          el.innerHTML = `<h3 contenteditable="true">${escapeHtml(node.title)}</h3><p contenteditable="true">${escapeHtml(node.text)}</p><small>${escapeHtml(node.kind)}</small>`;
          el.addEventListener('pointerdown', startNodeDrag);
          el.addEventListener('input', () => {
            const current = nodes.find((item) => item.id === node.id);
            current.title = el.querySelector('h3').innerText;
            current.text = el.querySelector('p').innerText;
            save();
          });
          world.appendChild(el);
        }
        save();
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
      }

      function screenToWorld(x, y) {
        return { x: (x - camera.x) / camera.z, y: (y - camera.y) / camera.z };
      }

      function startNodeDrag(event) {
        const nodeEl = event.currentTarget;
        selected = nodeEl.dataset.id;
        const node = nodes.find((item) => item.id === selected);
        if (event.target.isContentEditable) return;
        event.stopPropagation();
        nodeEl.setPointerCapture(event.pointerId);
        const point = screenToWorld(event.clientX, event.clientY);
        dragNode = { id: node.id, dx: point.x - node.x, dy: point.y - node.y };
        render();
      }

      stage.addEventListener('pointerdown', (event) => {
        stage.classList.add('dragging');
        dragCanvas = { x: event.clientX, y: event.clientY, cx: camera.x, cy: camera.y };
      });

      stage.addEventListener('pointermove', (event) => {
        if (dragNode) {
          const node = nodes.find((item) => item.id === dragNode.id);
          const point = screenToWorld(event.clientX, event.clientY);
          node.x = Math.round(point.x - dragNode.dx);
          node.y = Math.round(point.y - dragNode.dy);
          render();
          return;
        }
        if (dragCanvas) {
          camera.x = dragCanvas.cx + event.clientX - dragCanvas.x;
          camera.y = dragCanvas.cy + event.clientY - dragCanvas.y;
          render();
        }
      });

      stage.addEventListener('pointerup', () => {
        stage.classList.remove('dragging');
        dragCanvas = null;
        dragNode = null;
      });

      stage.addEventListener('wheel', (event) => {
        event.preventDefault();
        const before = screenToWorld(event.clientX, event.clientY);
        const delta = Math.exp(-event.deltaY * 0.001);
        camera.z = Math.min(2.6, Math.max(0.28, camera.z * delta));
        const after = screenToWorld(event.clientX, event.clientY);
        camera.x += (after.x - before.x) * camera.z;
        camera.y += (after.y - before.y) * camera.z;
        render();
      }, { passive: false });

      function addNode(kind, title, text) {
        const center = screenToWorld(innerWidth / 2, innerHeight / 2);
        nodes.unshift({ id: crypto.randomUUID(), x: Math.round(center.x - 140), y: Math.round(center.y - 65), kind, title, text });
        render();
      }

      document.getElementById('addNote').onclick = () => addNode('Note', 'New Signal', 'Write the fragment before it fades.');
      document.getElementById('addWorkflow').onclick = () => addNode('Workflow', 'AI Workflow', 'Input -> model -> review -> archive -> product.');
      document.getElementById('fit').onclick = () => { camera = { x: innerWidth / 2 - 190, y: innerHeight / 2 - 120, z: 1 }; render(); };
      document.getElementById('reset').onclick = () => { nodes = seed.map((item) => ({ ...item, id: crypto.randomUUID() })); camera = { x: innerWidth / 2 - 220, y: innerHeight / 2 - 130, z: 1 }; render(); };
      document.getElementById('exportJson').onclick = () => {
        const blob = new Blob([JSON.stringify({ nodes, camera }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'eliora-canvas.json';
        a.click();
        URL.revokeObjectURL(a.href);
      };

      load();
      render();
    </script>
  </body>
</html>
